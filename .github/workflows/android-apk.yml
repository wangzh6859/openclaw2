name: Android APK Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2026.4.25)'
        required: true
        default: 'v2026.4.25'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platform-android-34 build-tools-34.0.0'

      - name: Build Debug APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find apps/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          # Get filename
          APK_NAME=$(basename $APK_PATH)
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: |
            ## Android APK Release
            
            **Version:** ${{ github.event.inputs.version }}
            **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
            **Build Type:** Debug (for testing)
            
            ### Voice V2 Updates
            - Direct audio capture using AudioRecord
            - Bypasses broken system SpeechRecognizer
            - Backend ASR integration ready
            
            ### Installation
            1. Download the APK below
            2. Install on your Android device:
               - Enable "Install from Unknown Sources" in Settings
               - Download and open the APK file
            3. Grant microphone permission when prompted
            
            ### Testing Voice V2
            - Open the app
            - Go to Voice tab
            - Tap microphone
            - Speak and check if transcription appears
            
            ### Known Issues
            - This is a debug build (not optimized)
            - Backend ASR (`voice.asr` RPC) needs server-side implementation
            
            ### Next Steps
            After testing, please report:
            - [ ] App installs successfully
            - [ ] Microphone permission works
            - [ ] Voice UI responds (listening animation)
            - [ ] Any errors in logs
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
