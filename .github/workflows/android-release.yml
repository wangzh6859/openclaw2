name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2026.4.25)'
        required: true
        default: 'v2026.4.25'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platform-android-34 build-tools-34.0.0'

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > apps/android/app/release-key.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore found, building debug APK"
          fi
        shell: bash

      - name: Build Release APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ORG_GRADLE_PROJECT_releaseStoreFile: ${{ secrets.KEYSTORE_BASE64 }} && 'release-key.jks' || ''
          ORG_GRADLE_PROJECT_releaseStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_releaseKeyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_releaseKeyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find /home/runner/work/workspace/workspace/apps/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            # Fallback to debug APK
            APK_PATH=$(find /home/runner/work/workspace/workspace/apps/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
        shell: bash

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Android APK Release
            
            **Version:** ${{ steps.version.outputs.version }}
            **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
            
            ### Voice V2 Updates
            - Direct audio capture using AudioRecord
            - Bypasses broken system SpeechRecognizer
            - Backend ASR integration
            
            ### Installation
            1. Download the APK
            2. Install on your Android device (enable "Install from Unknown Sources")
            3. Open OpenClaw app
            
            ### Notes
            - This is a debug build if no keystore secrets are configured
            - For production releases, configure keystore secrets
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
