name: Android Build & Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Check/Generate Keystore
      id: keystore
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
        REPO: ${{ github.repository }}
      run: |
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "No keystore found. Generating..."
          KS_PASS=$(openssl rand -base64 12)
          keytool -genkey -v -keystore openclaw.keystore -alias openclaw -keyalg RSA -keysize 2048 -validity 10000 -storepass "$KS_PASS" -keypass "$KS_PASS" -dname "CN=OpenClaw, OU=AI, O=OpenClaw, L=SH, S=SH, C=CN"
          KS_B64=$(base64 -w 0 openclaw.keystore)
          echo "$KS_B64" | gh secret set KEYSTORE_BASE64 -r "$REPO"
          echo "$KS_PASS" | gh secret set KEYSTORE_PASSWORD -r "$REPO"
          echo "$KS_PASS" | gh secret set KEY_PASSWORD -r "$REPO"
          echo "openclaw" | gh secret set KEY_ALIAS -r "$REPO"
          echo "keystore_b64=$KS_B64" >> $GITHUB_OUTPUT
          echo "keystore_pass=$KS_PASS" >> $GITHUB_OUTPUT
        else
          echo "keystore_b64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_OUTPUT
          echo "keystore_pass=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
        fi

    - name: Decode Keystore
      run: |
        echo "${{ steps.keystore.outputs.keystore_b64 }}" | base64 -d > apps/android/release.keystore

    - name: Build with Gradle
      env:
        RUNNER_DIR: /home/runner/work/openclaw2/openclaw2
      run: |
        cd apps/android
        chmod +x gradlew
        ./gradlew assemblePlayRelease assembleThirdPartyRelease \
          -POPENCLAW_ANDROID_STORE_FILE=$RUNNER_DIR/apps/android/release.keystore \
          -POPENCLAW_ANDROID_STORE_PASSWORD=${{ steps.keystore.outputs.keystore_pass }} \
          -POPENCLAW_ANDROID_KEY_ALIAS=openclaw \
          -POPENCLAW_ANDROID_KEY_PASSWORD=${{ steps.keystore.outputs.keystore_pass }}

    - name: Get Version and Build Number
      id: versioning
      run: |
        # 获取版本名
        VERSION=$(grep "^[[:space:]]*versionName[[:space:]]*=" apps/android/app/build.gradle.kts | head -1 | sed 's/.*versionName[[:space:]]*=[[:space:]]*["]//;s/["].*//')
        
        # 使用 GitHub Actions 自带的运行序号作为构建号（无需额外权限）
        BUILD_NUM=${{ github.run_number }}
        
        # 生成 tag 和 release name
        TAG_VERSION="${VERSION}-${BUILD_NUM}"
        RELEASE_NAME="OpenClaw v${VERSION} #${BUILD_NUM}"
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
        echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
        echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

    - name: Generate Changelog
      id: changelog
      run: |
        # 获取上一次提交的 hash
        PREV_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
        if [ -n "$PREV_SHA" ]; then
          CHANGES=$(git log --pretty=format:"- %s" ${PREV_SHA}..HEAD 2>/dev/null | head -10)
        else
          CHANGES=$(git log --pretty=format:"- %s" -5 2>/dev/null)
        fi
        echo "changes<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.versioning.outputs.tag_version }}
        name: "${{ steps.versioning.outputs.release_name }}"
        body: |
          ## OpenClaw Android 构建版本
          
          ### 版本信息
          - **软件名称**: openclaw
          - **构建版本**: ${{ steps.versioning.outputs.release_name }}
          - **Tag**: v${{ steps.versioning.outputs.tag_version }}
          - **提交哈希**: ${{ github.sha }}
          - **构建时间**: ${{ github.event.head_commit.timestamp }}
          
          ### 本次更新
          ${{ steps.changelog.outputs.changes }}
          
          ### 安装说明
          - 首次安装：直接安装 APK
          - 覆盖安装：支持签名一致的覆盖安装（已使用永久固定签名）
          - 选择版本：
            - `play` 版：适用于 Google Play 环境（无 SMS/通话权限）
            - `thirdParty` 版：适用于第三方应用商店（含完整权限）
        files: |
          apps/android/app/build/outputs/apk/play/release/*.apk
          apps/android/app/build/outputs/apk/thirdParty/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
